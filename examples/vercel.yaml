# yaml-language-server: $schema=../agent-schema.json

models:
  vercel_model:
    provider: vercel
    model: openai/gpt-5

agents:
  root:
    model: vercel_model
    description: Assistant using Vercel AI Gateway
    instruction: |
      You are a helpful assistant.
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
